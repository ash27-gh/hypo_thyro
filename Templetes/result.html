<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prediction Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #e0f7fa, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    .result-text {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .status {
      font-size: 2rem;
      font-weight: bold;
    }

    .hypothyroid {
      color: #c0392b;
    }

    .not-hypothyroid {
      color: #27ae60;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card p-4 text-center">
      <h2 class="mb-3">Prediction Result</h2>
      <p class="result-text">Based on the input, the system predicts:</p>
      <p class="status {% if 'Hypothyroid' in result %}hypothyroid{% else %}not-hypothyroid{% endif %}">
        {{ result }}
      </p>
      <a href="/" class="btn btn-primary mt-3">Go Back</a>
    </div>
  </div>

</body>
</html>
